name: DB Backup

# สำรองฐานข้อมูล production อัตโนมัติทุกวัน + รันมือได้ผ่านปุ่ม Run workflow
# เก็บไฟล์ dump เป็น artifact (retention 30 วัน) — ดาวน์โหลด/กู้คืนได้จากหน้า Actions
#
# ต้องตั้ง secret: DATABASE_URL (Settings → Secrets and variables → Actions)
#   ใช้ Supabase "Session pooler" connection string
on:
  schedule:
    - cron: '0 19 * * *' # ทุกวัน 02:00 เวลาไทย (19:00 UTC)
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ติดตั้ง postgresql-client 15 (ให้ตรงกับ Supabase)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15

      - name: Dump ฐานข้อมูล
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: ./scripts/backup-db.sh ./backups

      - name: อัปโหลด backup เป็น artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 30
